services:
  - type: web
    name: study-notes-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DB_PATH
        value: /data/notes.db
    disk:
      name: notes-db
      mountPath: /data
      sizeGB: 1
