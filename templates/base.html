<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Study Notes{% endblock %} — Scholar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Code+Pro:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f13;
      --surface:   #17171f;
      --border:    #2a2a38;
      --accent:    #c8a96e;          /* warm gold */
      --accent2:   #6e9dc8;          /* steel blue */
      --danger:    #c86e6e;
      --success:   #6ec88a;
      --text:      #e8e4dc;
      --muted:     #7a7a8a;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans:  'Inter', system-ui, sans-serif;
      --font-mono:  'Source Code Pro', monospace;
      --radius:     6px;
      --shadow:     0 4px 24px rgba(0,0,0,.5);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 2rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .02em;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .logo-icon { font-size: 1.5rem; }

    .search-box {
      display: flex;
      gap: .5rem;
    }
    .search-box input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: .45rem .7rem;
      font-size: .85rem;
      font-family: var(--font-sans);
    }
    .search-box input:focus { outline: none; border-color: var(--accent); }
    .search-box button {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0f0f13;
      padding: .45rem .7rem;
      cursor: pointer;
      font-size: .9rem;
    }

    .nav { display: flex; flex-direction: column; gap: .25rem; }
    .nav a {
      color: var(--muted);
      text-decoration: none;
      padding: .5rem .75rem;
      border-radius: var(--radius);
      font-size: .875rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      transition: background .15s, color .15s;
    }
    .nav a:hover, .nav a.active {
      background: rgba(200,169,110,.08);
      color: var(--accent);
    }

    .btn-new {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      background: var(--accent);
      color: #0f0f13;
      font-weight: 600;
      font-size: .85rem;
      text-decoration: none;
      border-radius: var(--radius);
      padding: .65rem 1rem;
      transition: opacity .2s;
    }
    .btn-new:hover { opacity: .85; }

    /* ── Main content ────────────────────────────────────── */
    .main {
      padding: 2.5rem 2.5rem 4rem;
      max-width: 860px;
    }

    /* ── Flash messages ──────────────────────────────────── */
    .flash {
      padding: .75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      font-size: .875rem;
    }
    .flash.success { background: rgba(110,200,138,.12); border: 1px solid rgba(110,200,138,.3); color: var(--success); }
    .flash.error   { background: rgba(200,110,110,.12); border: 1px solid rgba(200,110,110,.3); color: var(--danger); }
    .flash.info    { background: rgba(110,157,200,.12); border: 1px solid rgba(110,157,200,.3); color: var(--accent2); }

    /* ── Utilities ───────────────────────────────────────── */
    .page-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text);
    }
    .muted { color: var(--muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: .85rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .15s, background .15s;
    }
    .btn:hover { border-color: var(--accent); background: rgba(200,169,110,.06); }
    .btn-primary  { background: var(--accent); border-color: var(--accent); color: #0f0f13; font-weight: 600; }
    .btn-primary:hover { opacity: .88; background: var(--accent); }
    .btn-danger   { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(200,110,110,.08); }

    .tag {
      display: inline-block;
      background: rgba(110,157,200,.15);
      color: var(--accent2);
      border-radius: 20px;
      padding: .15rem .65rem;
      font-size: .75rem;
      font-family: var(--font-mono);
    }
    .kw-tag {
      display: inline-block;
      background: rgba(200,169,110,.1);
      color: var(--accent);
      border-radius: 20px;
      padding: .15rem .65rem;
      font-size: .75rem;
      font-family: var(--font-mono);
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo"><span class="logo-icon">📖</span> Scholar</div>

    <form class="search-box" action="/search" method="GET">
      <input type="text" name="q" placeholder="Search notes…" />
      <button type="submit">🔍</button>
    </form>

    <nav class="nav">
      <a href="/">🏠 All Notes</a>
      <a href="/new">✏️ New Note</a>
    </nav>

    <a class="btn-new" href="/new">+ New Note</a>
  </aside>

  <!-- Main -->
  <main class="main">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
